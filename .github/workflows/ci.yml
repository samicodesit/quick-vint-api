name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-verify:
    runs-on: ubuntu-latest

    steps:
      # 1) Check out your code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2) Set up pnpm (lockfile version 9)
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # 3) Install Node.js (pnpm cache requires pnpm to be set up first)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      # 4) Install dependencies
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 5) Lint with ESLint
      - name: Lint code
        run: pnpm run lint

      # 6) Type-check with tsc
      - name: Type-check
        run: pnpm run type-check

      # 7) Build (catches Astro/Vite build errors before they reach Vercel)
      - name: Build
        run: pnpm run build

      # 8) Verify formatting
      - name: Format check
        run: pnpm run format-check

      # 9) Audit production dependencies for high-severity vulns
      # (--prod excludes devDep transitive chains like @vercel/node>tar, eslint>minimatch, etc.)
      - name: Audit dependencies
        run: pnpm audit --audit-level=high --prod

      # 10) Run tests
      - name: Run tests
        run: pnpm test
