        function getIsoDateDaysAgo(days) {
            const date = new Date();
            date.setHours(0, 0, 0, 0);
            date.setDate(date.getDate() - days);
            return date.toISOString().slice(0, 10);
        }

        function getDefaultChromePeriod(preset = 'last_30_days') {
            const days = preset === 'last_90_days' ? 89 : 29;
            return {
                preset,
                start: getIsoDateDaysAgo(days),
                end: getIsoDateDaysAgo(0),
            };
        }

        function getChromeSnapshotPeriod(snapshot = {}) {
            const fallback = getDefaultChromePeriod(snapshot.periodPreset || 'last_30_days');
            const start = snapshot.periodStart || fallback.start;
            const end = snapshot.periodEnd || fallback.end;
            return {
                start,
                end,
                label: start && end ? `${start} to ${end}` : 'No period selected',
            };
        }

        function getInclusiveDateRangeDays(start, end) {
            if (!start || !end) return 0;
            const startTime = new Date(`${start}T00:00:00Z`).getTime();
            const endTime = new Date(`${end}T00:00:00Z`).getTime();
            if (!Number.isFinite(startTime) || !Number.isFinite(endTime) || endTime < startTime) return 0;
            return Math.floor((endTime - startTime) / (24 * 60 * 60 * 1000)) + 1;
        }

        function getChromeSnapshotWarnings(snapshot = {}) {
            const warnings = [];
            const impressions = Number(snapshot.impressions || 0);
            const visitors = Number(snapshot.visitors || 0);
            const installs = Number(snapshot.installs || 0);
            const uninstalls = Number(snapshot.uninstalls || snapshot.uninstallRate || 0);
            const weeklyUsers = Number(snapshot.weeklyUsers || 0);
            const period = getChromeSnapshotPeriod(snapshot);

            if (!snapshot.periodStart || !snapshot.periodEnd) {
                warnings.push('Choose the Chrome Web Store reporting period. Metrics without dates are not reliable.');
            } else if (period.start > period.end) {
                warnings.push('Period start is after period end. Fix the date range before using this snapshot.');
            } else if (getInclusiveDateRangeDays(period.start, period.end) < 30) {
                warnings.push('Chrome Web Store metrics must use at least 30 days. Select Last 30 days or a longer custom range.');
            }
            if (visitors > impressions && impressions > 0) {
                warnings.push('Page views are higher than impressions. Check that both numbers use the same Chrome Store period.');
            }
            if (installs > visitors && visitors > 0) {
                warnings.push('Installs are higher than page views. Check that both numbers use the same Chrome Store period.');
            }
            if (uninstalls > installs && installs > 0) {
                warnings.push('Uninstalls are higher than installs in this period. This can happen, but treat growth quality as weak.');
            }
            if (weeklyUsers > 0 && installs > 0 && weeklyUsers < installs * 0.5) {
                warnings.push('Weekly users are low compared with installs. Check whether many installs churn quickly.');
            }
            if (snapshot.updatedAt) {
                const ageMs = Date.now() - new Date(snapshot.updatedAt).getTime();
                if (Number.isFinite(ageMs) && ageMs > 3 * 24 * 60 * 60 * 1000) {
                    warnings.push('Chrome Store snapshot is over 3 days old. Refresh it before making store decisions.');
                }
            }
            return warnings;
        }

        function applyChromePeriodPreset(preset) {
            if (preset === 'custom') return;
            const period = getDefaultChromePeriod(preset);
            const startInput = document.getElementById('chromePeriodStart');
            const endInput = document.getElementById('chromePeriodEnd');
            if (startInput) startInput.value = period.start;
            if (endInput) endInput.value = period.end;
        }

        function buildMailtoScript(email, scriptId) {
            const scripts = {
                one_generation: {
                    subject: 'Quick AutoLister AI question',
                    body: `Hey,\n\nYou tried AutoLister AI for a Vinted listing, so I wanted to ask one very quick thing.\n\nWhat stopped you from using it for another item?\n\n1. No more items to list\n2. Result was not useful enough\n3. Upload/generation felt confusing\n4. Pricing or limits were unclear\n5. I forgot about it\n\nA one-number reply is enough.\n\nThanks,\nSami`,
                },
            };
            const script = scripts[scriptId];
            if (!email || !script) return '#';
            return `mailto:${encodeURIComponent(email)}?subject=${encodeURIComponent(script.subject)}&body=${encodeURIComponent(script.body)}`;
        }

        function getChromeStoreSnapshot() {
            try {
                return JSON.parse(localStorage.getItem('chrome_store_snapshot') || '{}');
            } catch (e) {
                return {};
            }
        }

        function readNumberInput(id) {
            const value = document.getElementById(id)?.value;
            if (value === undefined || value === null || value === '') return '';
            const parsed = Number(value);
            return Number.isFinite(parsed) && parsed >= 0 ? String(parsed) : '';
        }

        function saveChromeStoreSnapshot() {
            const periodPreset = document.getElementById('chromePeriodPreset')?.value || 'last_30_days';
            const snapshot = {
                periodPreset,
                periodStart: document.getElementById('chromePeriodStart')?.value || '',
                periodEnd: document.getElementById('chromePeriodEnd')?.value || '',
                impressions: readNumberInput('chromeImpressions'),
                visitors: readNumberInput('chromeVisitors'),
                installs: readNumberInput('chromeInstalls'),
                uninstalls: readNumberInput('chromeUninstalls'),
                weeklyUsers: readNumberInput('chromeWeeklyUsers'),
                users: readNumberInput('chromeUsers'),
                ratingCount: readNumberInput('chromeRatingCount'),
                updatedAt: new Date().toISOString(),
            };
            const warnings = getChromeSnapshotWarnings(snapshot);
            const blockingWarning = warnings.find((warning) =>
                warning.includes('Period start is after period end') ||
                warning.includes('must use at least 30 days'),
            );
            if (blockingWarning) {
                showToast(blockingWarning, 'error');
                return;
            }
            localStorage.setItem('chrome_store_snapshot', JSON.stringify(snapshot));
            showToast('Chrome Store snapshot saved', 'success');
            renderGrowth(document.getElementById('contentArea'));
        }

        function clearChromeStoreSnapshot() {
            localStorage.removeItem('chrome_store_snapshot');
            showToast('Chrome Store snapshot cleared', 'success');
            renderGrowth(document.getElementById('contentArea'));
        }

        function buildGrowthAdvisor(input) {
            const pctText = (value) => `${Number(value || 0).toFixed(1)}%`;
            const ratioText = (part, total) => total ? `${((Number(part || 0) / Number(total || 0)) * 100).toFixed(1)}%` : 'n/a';
            const today = new Date().toISOString().slice(0, 10);
            const recentLog = (input.decisionLog || []).filter(item => {
                if (!item.date) return false;
                const ageMs = new Date(`${today}T00:00:00Z`).getTime() - new Date(`${item.date}T00:00:00Z`).getTime();
                return Number.isFinite(ageMs) && ageMs >= 0 && ageMs <= 7 * 24 * 60 * 60 * 1000;
            });
            const sameFocusRecent = recentLog.filter(item => item.focus === input.focus);
            const lastSameFocus = sameFocusRecent[0];
            const doneToday = recentLog.some(item => item.date === today && item.focus === input.focus && item.status === 'done');
            const loopDetected = input.focus !== 'Measurement' && sameFocusRecent.length >= 2 && !doneToday;
            const evidence = [
                {
                    label: 'Store',
                    value: input.chromeSnapshotReady
                        ? `${input.chromeInstalls} installs from ${input.chromeVisitors} page views`
                        : 'Chrome Store snapshot incomplete',
                    note: input.chromeSnapshotReady
                        ? `${ratioText(input.chromeInstalls, input.chromeVisitors)} page-view install rate; ${ratioText(input.chromeUninstalls, input.chromeInstalls)} uninstalls/install.`
                        : 'Save page views, impressions, installs, uninstalls, weekly users, and ratings before making store decisions.',
                },
                {
                    label: 'Product',
                    value: `${pctText(input.twoPlusGenerationRate)} reach 2+ generations`,
                    note: `${pctText(input.quotaPressureRate)} quota pressure; ${Number(input.avgGenerationsPerActive || 0).toFixed(1)} generations per active generator.`,
                },
                {
                    label: 'Money',
                    value: `${pctText(input.rates.signupToPaid30d)} signup -> paid`,
                    note: `${input.paywallShown || 0} paywalls shown; ${pctText(input.paywallToCheckoutRate)} paywall -> checkout.`,
                },
                {
                    label: 'Memory',
                    value: sameFocusRecent.length
                        ? `${sameFocusRecent.length} ${input.focus} action${sameFocusRecent.length === 1 ? '' : 's'} logged in 7 days`
                        : 'No recent actions logged',
                    note: doneToday
                        ? 'Today is already marked done for this focus.'
                        : loopDetected
                            ? 'The same focus is repeating. Stop repeating the same move; ask for a fresh diagnosis.'
                            : 'Use Mark action done after you actually complete the recommended action.',
                },
            ];

            const missing = [];
            if (!input.chromeSnapshotReady) missing.push('Chrome Store snapshot');
            if (!Number(input.last30?.activeGenerators || 0)) missing.push('active generator volume');
            if (Number(input.paywallShown || 0) < 10) missing.push('paywall sample size');
            const confidence = missing.length === 0 ? 'high' : missing.length === 1 ? 'medium' : 'low';

            const notNowByFocus = {
                Measurement: ['Changing store copy from incomplete data', 'Scaling outreach volume'],
                'Store Listing': ['Building new features', 'Changing pricing'],
                Acquisition: ['Paid ads', 'Big onboarding rewrites'],
                Activation: ['More top-of-funnel traffic', 'Rating asks'],
                'Value Depth': ['Paid ads', 'More dashboard analysis'],
                Paywall: ['Store listing tweaks', 'New acquisition channels'],
                Scale: ['Large product rewrites', 'Changing the free limit'],
            };

            const primaryAction = loopDetected
                ? {
                    title: 'Copy the Codex brief and ask for a fresh diagnosis',
                    note: `This has repeated ${sameFocusRecent.length} times in the last 7 days. Do not do the same action again without changing the approach.`,
                }
                : doneToday
                    ? {
                        title: 'Stop for today unless new data changed',
                        note: 'This focus is already marked done today. Check again tomorrow or after a real product/store change.',
                    }
                    : input.primaryAction || { title: 'Open Growth data', note: 'Save the current data snapshot first.' };

            return {
                state: loopDetected
                    ? `${input.focus}: repeating pattern detected`
                    : doneToday
                        ? `${input.focus}: today is already handled`
                        : `${input.focus}: ${confidence === 'low' ? 'data is not strong enough yet' : 'next action is clear'}`,
                confidence,
                timebox: input.focus === 'Measurement' ? '10 minutes' : '60-90 minutes',
                primaryAction,
                evidence,
                missing,
                notNow: loopDetected
                    ? ['Repeating the same action again', 'Adding more metrics before changing the approach']
                    : notNowByFocus[input.focus] || ['Adding more metrics', 'Changing multiple things at once'],
                memory: [
                    doneToday
                        ? 'Memory: this focus is marked done today.'
                        : sameFocusRecent.length
                            ? `Memory: ${sameFocusRecent.length} recent ${input.focus} action${sameFocusRecent.length === 1 ? '' : 's'} logged.`
                            : 'Memory: no recent logged action for this focus.',
                    lastSameFocus?.result ? `Last result: ${lastSameFocus.result}` : '',
                    loopDetected
                        ? 'Loop guard: copy the Codex brief before doing more of the same.'
                        : missing.length
                            ? `Data gap: ${missing.join(', ')}.`
                            : 'Data coverage: enough to act today.',
                ].filter(Boolean),
            };
        }

        function buildGrowthCodexBrief(input) {
            const lines = [
                'AutoLister AI growth brief',
                `Date: ${new Date().toISOString().slice(0, 10)}`,
                `Focus: ${input.focus}`,
                `Advisor state: ${input.advisor.state}`,
                `Confidence: ${input.advisor.confidence}`,
                `Primary action: ${input.advisor.primaryAction.title}`,
                `Primary action note: ${input.advisor.primaryAction.note}`,
                `Reason: ${input.focusReason}`,
                '',
                'Chrome Store snapshot:',
                `Period: ${input.chromePeriod.label}`,
                `Page views: ${input.chromeSnapshot.visitors || 'blank'}`,
                `Impressions: ${input.chromeSnapshot.impressions || 'blank'}`,
                `Installs: ${input.chromeSnapshot.installs || 'blank'}`,
                `Uninstalls: ${input.chromeSnapshot.uninstalls || input.chromeSnapshot.uninstallRate || 'blank'}`,
                `Weekly users: ${input.chromeSnapshot.weeklyUsers || 'blank'}`,
                `Public users: ${input.chromeSnapshot.users || 'blank'}`,
                `Rating count: ${input.chromeSnapshot.ratingCount || 'blank'}`,
                '',
                'Product metrics:',
                `30-day signups: ${input.last30.signups || 0}`,
                `30-day active generators: ${input.totals.activeGenerators || 0}`,
                `30-day successful generations: ${input.last30.successfulGenerations || 0}`,
                `2+ generation users: ${input.totals.twoPlusGenerationUsers || 0} (${input.rates.twoPlusGeneration30d || 0}%)`,
                `Quota pressure users: ${input.totals.quotaPressureUsers || 0} (${input.rates.quotaPressure30d || 0}%)`,
                `Limit hits: ${input.last30.limitHits || 0}`,
                `Paywalls shown: ${input.last30.paywallShown || 0}`,
                `Checkout starts: ${input.last30.checkoutStart || 0}`,
                `Signup to paid: ${input.rates.signupToPaid30d || 0}%`,
                '',
                'Advisor memory:',
                ...input.advisor.memory,
                '',
                'Question for Codex:',
                'Given this exact state, what should I do next today? Be specific and do not suggest vague user research.',
            ];
            return lines.join('\n');
        }

        async function copyGrowthBrief() {
            const text = document.getElementById('growthCodexBrief')?.textContent || '';
            if (!text) return;
            try {
                await navigator.clipboard.writeText(text);
                showToast('Copied Codex brief', 'success');
            } catch (e) {
                showToast('Could not copy automatically. Select the brief manually.', 'error');
            }
        }

        function getGrowthDecisionLog() {
            try {
                return JSON.parse(localStorage.getItem('growth_decision_log') || '[]');
            } catch (e) {
                return [];
            }
        }

        function saveGrowthDecisionLog(log) {
            localStorage.setItem('growth_decision_log', JSON.stringify(log.slice(0, 30)));
        }

        function markGrowthAdvisorDone() {
            const recordText = document.getElementById('growthAdvisorRecord')?.textContent || '';
            if (!recordText) return;
            let record;
            try {
                record = JSON.parse(recordText);
            } catch (e) {
                showToast('Could not read advisor state', 'error');
                return;
            }
            const result = document.getElementById('growthAdvisorResult')?.value || '';
            const log = getGrowthDecisionLog().filter(item => !(item.date === record.date && item.focus === record.focus));
            log.unshift({
                ...record,
                status: 'done',
                result: result.trim() || record.actionTitle,
                completedAt: new Date().toISOString(),
            });
            saveGrowthDecisionLog(log);
            showToast('Growth action marked done', 'success');
            renderGrowth(document.getElementById('contentArea'));
        }

        function getGrowthTaskProgress() {
            try {
                return JSON.parse(localStorage.getItem('growth_task_progress') || '{}');
            } catch (e) {
                return {};
            }
        }

        function todayTaskKey(id) {
            return `${new Date().toISOString().slice(0, 10)}:${id}`;
        }

        function toggleGrowthTask(id, checked) {
            const progress = getGrowthTaskProgress();
            progress[todayTaskKey(id)] = checked;
            localStorage.setItem('growth_task_progress', JSON.stringify(progress));
        }

        function getGrowthMonthPlan(focus) {
            const common = [
                { week: 'Week 1', title: 'Baseline and store trust', note: 'Upload .18, save Chrome Store snapshots, ask for first ratings, send outreach daily.' },
                { week: 'Week 2', title: 'Increase free quota depth', note: 'Ship one change that gets more users from first generation to 2-3 generations.' },
                { week: 'Week 3', title: 'SEO and store iteration', note: 'Improve one search-intent page and one Chrome Store asset based on data.' },
                { week: 'Week 4', title: 'Scale only what worked', note: 'Double the best channel only if installs become active generators.' },
            ];
            if (focus === 'Store Listing') {
                return [
                    { week: 'Week 1', title: 'Fix install conversion', note: 'Improve screenshots, short description, and first paragraph. Keep search phrase visible.' },
                    { week: 'Week 2', title: 'Add trust', note: 'Ask happy users for ratings and improve listing proof.' },
                    { week: 'Week 3', title: 'Compare CWS periods', note: 'Save 30-day Chrome Store snapshots and keep changes that lift visitor -> install rate.' },
                    { week: 'Week 4', title: 'Scale traffic', note: 'Only increase outreach/paid tests if store conversion is healthy.' },
                ];
            }
            if (focus === 'Activation') {
                return [
                    { week: 'Week 1', title: 'Fix first generation', note: 'Remove the biggest first-use blocker.' },
                    { week: 'Week 2', title: 'Shorten onboarding', note: 'Make sign-in -> generate feel obvious.' },
                    { week: 'Week 3', title: 'Improve second generation', note: 'Make the next-item action obvious after first success.' },
                    { week: 'Week 4', title: 'Resume acquisition', note: 'Only after activation is no longer weak.' },
                ];
            }
            return common;
        }

        async function copyGrowthScript(id) {
            const text = document.getElementById(`growthScript-${id}`)?.textContent || '';
            if (!text) return;
            try {
                await navigator.clipboard.writeText(text);
                showToast('Copied script', 'success');
            } catch (e) {
                showToast('Could not copy automatically. Select the script text manually.', 'error');
            }
        }

        // --- Helpers ---
        async function fetchAPI(endpoint) {
            const res = await fetch(endpoint, {
                headers: { 'Authorization': `Bearer ${state.secret}` }
            });
            if (!res.ok) throw new Error(res.statusText);
            return await res.json();
        }

        async function resetUsage(userId) {
            if (!confirm('Are you sure you want to reset all usage limits for this user?')) return;

            try {
                const res = await fetch('/api/admin?action=reset-usage', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${state.secret}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ userId })
                });

                const data = await res.json();
                if (data.success) {
                    showToast('Usage limits reset successfully');
                    loadView('users'); // Refresh list
                } else {
                    showToast(data.error || 'Failed to reset usage', 'error');
                }
            } catch (e) {
                showToast('Connection failed', 'error');
            }
        }

        async function setAccountStatus(userId, status) {
            let notes = '';
            if (status === 'paused') {
                notes = prompt('Why are you pausing this account? Add evidence/context for future review.', 'Likely duplicate free quota abuse: ');
                if (notes === null) return;
                notes = notes.trim();
                if (!notes) {
                    showToast('Pause notes are required', 'error');
                    return;
                }
                if (!confirm('Pause this account now? The user will be blocked from generation but can contact support or buy a paid option.')) return;
            } else if (!confirm('Unpause this account now?')) {
                return;
            }

            try {
                const res = await fetch('/api/admin?action=set-account-status', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${state.secret}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        userId,
                        status,
                        reason: status === 'paused' ? 'duplicate_free_quota_abuse' : null,
                        notes
                    })
                });

                const data = await res.json();
                if (data.success) {
                    showToast(data.message || 'Account status updated');
                    loadView('users');
                } else {
                    showToast(data.error || 'Failed to update account status', 'error');
                }
            } catch (e) {
                showToast('Connection failed', 'error');
            }
        }

        function showLogDetails(id) {
            const log = state.currentLogs.find(l => l.id === id);
            if (!log) return;

            // Parse images
            let images = [];
            try {
                if (typeof log.image_urls === 'string') images = JSON.parse(log.image_urls);
                else if (Array.isArray(log.image_urls)) images = log.image_urls;
            } catch (e) { }

            const imagesHtml = images.length > 0 ?
                `<div class="image-gallery">
                    ${images.map(url => `<img src="${url}" class="gallery-img" onclick="window.open('${url}', '_blank')" loading="lazy">`).join('')}
                 </div>` :
                '<div style="padding: 2rem; text-align: center; background: #f9fafb; border-radius: 0.5rem; color: var(--text-muted);">No images found</div>';

            const content = `
                <div>
                    <h4 style="margin-bottom: 1rem; font-weight: 600;">Input Images</h4>
                    ${imagesHtml}
                    
                    <div style="margin-top: 1.5rem;">
                        <label class="text-sm font-bold text-muted">Full Prompt</label>
                        <div class="p-2 bg-gray-100 rounded mt-1" style="max-height: 200px; overflow-y: auto; white-space: pre-wrap; font-size: 0.875rem;">${log.raw_prompt}</div>
                    </div>
                </div>
                
                <div style="display: flex; flex-direction: column; gap: 1.5rem;">
                    <div>
                        <label class="text-sm font-bold text-muted">Generated Output</label>
                        <div class="p-2 bg-gray-100 rounded mt-1" style="border: 1px solid var(--border-color);">
                            <div style="font-weight: 600; margin-bottom: 0.5rem;">${log.generated_title || 'No Title'}</div>
                            <div style="white-space: pre-wrap; font-size: 0.875rem;">${log.generated_description || 'No Description'}</div>
                        </div>
                    </div>
                    
                    <div>
                        <label class="text-sm font-bold text-muted">Metadata</label>
                        <div class="json-view">${JSON.stringify(JSON.parse(log.request_metadata || '{}'), null, 2)}</div>
                    </div>

                    <div style="margin-top: auto; padding-top: 1rem; border-top: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center;">
                        <div class="text-sm text-muted">
                            ID: ${log.id}<br>
                            Model: ${log.openai_model || 'N/A'}
                        </div>
                        ${log.suspicious_activity ?
                    `<button class="btn-primary" style="background: var(--success); width: auto;" onclick="alert('Feature coming soon: Unflag')">Mark Safe</button>` :
                    `<button class="btn-primary" style="background: var(--danger); width: auto;" onclick="alert('Feature coming soon: Flag')">Flag Suspicious</button>`
                }
                    </div>
                </div>
            `;

            openModal(`Log Details`, content);
        }

        function openModal(title, contentHtml) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalBody').innerHTML = contentHtml;
            document.getElementById('modalBackdrop').classList.add('open');
        }

        function closeModal() {
            document.getElementById('modalBackdrop').classList.remove('open');
        }

        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = `toast toast-${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Initialize
        init();
    </script>
</body>

</html>
