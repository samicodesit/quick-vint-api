<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoLister AI - Admin Dashboard</title>
    <link rel="icon" href="/logo.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            /* Modern SaaS Palette (Linear/Vercel inspired) */
            --bg-body: #ffffff;
            --bg-subtle: #f9fafb;
            --bg-card: #ffffff;
            --bg-sidebar: #f9fafb;

            --text-main: #111827;
            --text-muted: #6b7280;
            --text-light: #9ca3af;

            --primary: #000000;
            --primary-hover: #333333;
            --primary-text: #ffffff;

            --border-color: #e5e7eb;
            --border-hover: #d1d5db;

            --success-bg: #ecfdf5;
            --success-text: #059669;
            --warning-bg: #fffbeb;
            --warning-text: #d97706;
            --danger-bg: #fef2f2;
            --danger-text: #dc2626;
            --info-bg: #eff6ff;
            --info-text: #2563eb;

            --sidebar-width: 260px;
            --header-height: 64px;

            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;

            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-card: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            height: auto;
            overflow-x: hidden;
            overflow-y: hidden;
            display: flex;
            font-size: 14px;
            line-height: 1.5;
        }

        @media (max-width: 768px) {
            body {
                overflow-y: auto;
            }
        }

        body.menu-locked {
            overflow: hidden;
        }

        /* Auth Screen */
        .auth-container {
            position: fixed;
            inset: 0;
            background: var(--bg-body);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .auth-card {
            background: var(--bg-card);
            padding: 2.5rem;
            width: 100%;
            max-width: 380px;
            text-align: center;
        }

        .auth-logo {
            width: 48px;
            height: 48px;
            margin-bottom: 2rem;
        }

        .auth-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-main);
            letter-spacing: -0.02em;
        }

        .auth-subtitle {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .input-group {
            margin-bottom: 1.25rem;
            text-align: left;
        }

        .input-label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        .form-input {
            width: 100%;
            padding: 0.625rem 0.875rem;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 0.95rem;
            transition: all 0.15s ease;
            background: #fff;
            color: var(--text-main);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--text-muted);
            box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.05);
        }

        .btn-primary {
            width: 100%;
            padding: 0.625rem 1rem;
            background: var(--primary);
            color: var(--primary-text);
            border: 1px solid transparent;
            border-radius: var(--radius-md);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* Mobile Menu Toggle */
        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            padding: 0.5rem;
            cursor: pointer;
            color: var(--text-main);
        }

        @media (max-width: 768px) {
            .mobile-menu-btn {
                display: block;
            }
        }

        /* Dashboard Layout */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            height: 100%;
            position: fixed;
            left: 0;
            top: 0;
            z-index: 50;
            transition: transform 0.3s ease;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 82vw;
                max-width: 320px;
                box-shadow: 0 18px 50px rgba(0, 0, 0, 0.18);
                transform: translateX(-105%);
            }

            .sidebar.mobile-open {
                transform: translateX(0);
            }
        }

        .sidebar-header {
            height: var(--header-height);
            display: flex;
            align-items: center;
            padding: 0 1.5rem;
            font-weight: 600;
            font-size: 1rem;
            color: var(--text-main);
            gap: 0.75rem;
        }

        .sidebar-nav {
            padding: 1.5rem 0.75rem;
            flex: 1;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem 0.75rem;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: var(--radius-sm);
            margin-bottom: 0.25rem;
            transition: all 0.15s ease;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .nav-item:hover {
            background: rgba(0, 0, 0, 0.03);
            color: var(--text-main);
        }

        .nav-item.active {
            background: #fff;
            color: var(--text-main);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
        }

        .sidebar-footer {
            padding: 1rem;
            border-top: 1px solid var(--border-color);
        }

        .main-content {
            margin-left: var(--sidebar-width);
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            min-height: 100vh;
            overflow: hidden;
            background: var(--bg-body);
            max-width: 100vw;
        }

        @media (max-width: 768px) {
            .main-content {
                margin-left: 0;
                height: auto;
                min-height: 100vh;
                overflow: visible;
            }
        }

        .top-bar {
            min-height: var(--header-height);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            flex-shrink: 0;
            position: sticky;
            top: 0;
            z-index: 40;
            gap: 0.75rem;
        }

        @media (max-width: 768px) {
            .top-bar {
                padding: 0.75rem 1rem;
                flex-wrap: wrap;
                gap: 0.5rem;
            }
        }

        .page-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-main);
        }

        @media (max-width: 768px) {
            .page-title {
                font-size: 1rem;
            }
        }

        /* Responsive buttons and controls */
        .btn-primary {
            width: 100%;
            padding: 0.625rem 1rem;
            background: var(--primary);
            color: var(--primary-text);
            border: 1px solid transparent;
            border-radius: var(--radius-md);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        @media (max-width: 768px) {
            .btn-primary {
                padding: 0.5rem 0.75rem;
                font-size: 0.85rem;
            }
        }

        .content-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            width: 100%;
            max-width: 1280px;
            margin: 0 auto;
        }

        @media (max-width: 1024px) {
            .content-scroll {
                padding: 1.5rem;
            }
        }

        @media (max-width: 768px) {
            .content-scroll {
                overflow-y: visible;
                padding: 1rem 1rem 4.5rem;
            }
        }

        @media (max-width: 480px) {
            .content-scroll {
                padding: 0.85rem 0.85rem 4.5rem;
            }
        }

        /* Cards & Stats */
        .grid-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        @media (max-width: 768px) {
            .grid-stats {
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 0.75rem;
            }
        }

        @media (max-width: 520px) {
            .grid-stats {
                grid-template-columns: 1fr;
            }
        }

        .stat-card {
            background: var(--bg-card);
            padding: 1.25rem;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
        }

        @media (max-width: 768px) {
            .stat-card {
                padding: 1rem;
            }
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 1.75rem;
            font-weight: 600;
            color: var(--text-main);
            letter-spacing: -0.02em;
            line-height: 1.2;
            margin-bottom: 0.25rem;
        }

        @media (max-width: 768px) {
            .stat-value {
                font-size: 1.5rem;
            }
        }

        .stat-trend {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        .trend-up {
            color: var(--success-text);
        }

        .trend-down {
            color: var(--danger-text);
        }

        .insight-grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr);
            gap: 1rem;
            margin-bottom: 1rem;
        }

        @media (max-width: 900px) {
            .insight-grid {
                grid-template-columns: 1fr;
            }
        }

        .insight-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            padding: 1.25rem;
        }

        .growth-shell {
            display: grid;
            gap: 1rem;
        }

        .growth-hero {
            background: #111827;
            border: 1px solid #111827;
            border-radius: var(--radius-lg);
            color: #fff;
            padding: 1.25rem;
        }

        .advisor-panel {
            display: grid;
            gap: 1rem;
            grid-template-columns: minmax(0, 1.2fr) minmax(280px, 0.8fr);
            margin-top: 1rem;
        }

        @media (max-width: 900px) {
            .advisor-panel {
                grid-template-columns: 1fr;
            }
        }

        .advisor-action {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: var(--radius-md);
            padding: 1rem;
        }

        .advisor-action-title {
            color: #fff;
            font-size: 1.05rem;
            font-weight: 800;
            margin-bottom: 0.35rem;
        }

        .advisor-evidence {
            display: grid;
            gap: 0.55rem;
        }

        .advisor-evidence-item {
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 0.8rem;
        }

        .advisor-evidence-label {
            color: var(--text-light);
            font-size: 0.72rem;
            font-weight: 800;
            letter-spacing: 0.05em;
            margin-bottom: 0.15rem;
            text-transform: uppercase;
        }

        .advisor-evidence-value {
            color: var(--text-main);
            font-size: 0.92rem;
            font-weight: 700;
        }

        .advisor-meta {
            align-items: center;
            display: flex;
            flex-wrap: wrap;
            gap: 0.55rem;
            margin-top: 0.75rem;
        }

        .advisor-chip {
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 999px;
            color: rgba(255, 255, 255, 0.86);
            font-size: 0.78rem;
            font-weight: 700;
            padding: 0.32rem 0.6rem;
        }

        .not-now-list {
            display: grid;
            gap: 0.45rem;
            margin-top: 0.75rem;
        }

        .not-now-item {
            color: rgba(255, 255, 255, 0.72);
            font-size: 0.84rem;
        }

        .advisor-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            margin-top: 1rem;
        }

        .memory-strip {
            display: grid;
            gap: 0.5rem;
            margin-top: 0.75rem;
        }

        .memory-item {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: var(--radius-md);
            color: rgba(255, 255, 255, 0.78);
            font-size: 0.82rem;
            padding: 0.65rem 0.75rem;
        }

        .advisor-result-input {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: var(--radius-md);
            color: #fff;
            font: inherit;
            margin-top: 0.85rem;
            min-height: 72px;
            padding: 0.75rem;
            resize: vertical;
            width: 100%;
        }

        .advisor-result-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .growth-hero .insight-title,
        .growth-hero .insight-copy,
        .growth-hero .action-note {
            color: #fff;
        }

        .growth-hero .insight-copy,
        .growth-hero .action-note {
            color: rgba(255, 255, 255, 0.76);
        }

        .growth-hero .action-item {
            border-color: rgba(255, 255, 255, 0.16);
        }

        .growth-hero .action-number {
            background: #fff;
            color: #111827;
        }

        .growth-section {
            display: grid;
            gap: 1rem;
            grid-template-columns: minmax(0, 1fr) minmax(320px, 0.8fr);
        }

        @media (max-width: 1020px) {
            .growth-section {
                grid-template-columns: 1fr;
            }
        }

        .growth-section.compact {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        @media (max-width: 860px) {
            .growth-section.compact {
                grid-template-columns: 1fr;
            }
        }

        .operator-note {
            align-items: center;
            background: var(--info-bg);
            border: 1px solid #bfdbfe;
            border-radius: var(--radius-md);
            color: var(--info-text);
            display: flex;
            font-size: 0.86rem;
            font-weight: 600;
            gap: 0.55rem;
            padding: 0.75rem 0.85rem;
        }

        .section-kicker {
            color: var(--text-light);
            font-size: 0.72rem;
            font-weight: 800;
            letter-spacing: 0.06em;
            margin-bottom: 0.35rem;
            text-transform: uppercase;
        }

        .loading-state {
            align-items: center;
            color: var(--text-muted);
            display: flex;
            gap: 0.7rem;
            justify-content: center;
            min-height: 260px;
        }

        .loading-state .spinner {
            height: 22px;
            width: 22px;
        }

        .insight-title {
            font-size: 0.95rem;
            font-weight: 700;
            margin-bottom: 0.35rem;
        }

        .insight-copy {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .diagnostic-list,
        .action-list {
            display: grid;
            gap: 0.75rem;
        }

        .diagnostic-item {
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 0.85rem;
            background: var(--bg-subtle);
        }

        .diagnostic-item.good {
            border-color: #bbf7d0;
            background: #f0fdf4;
        }

        .diagnostic-item.watch {
            border-color: #fde68a;
            background: #fffbeb;
        }

        .diagnostic-item.problem {
            border-color: #fecaca;
            background: #fef2f2;
        }

        .diagnostic-head {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 0.2rem;
        }

        .diagnostic-note,
        .action-note {
            color: var(--text-muted);
            font-size: 0.82rem;
        }

        .action-item {
            display: flex;
            gap: 0.65rem;
            align-items: flex-start;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.75rem;
        }

        .action-item:last-child {
            border-bottom: 0;
            padding-bottom: 0;
        }

        .action-number {
            align-items: center;
            background: var(--primary);
            border-radius: 999px;
            color: var(--primary-text);
            display: inline-flex;
            flex: 0 0 auto;
            font-size: 0.75rem;
            font-weight: 700;
            height: 1.45rem;
            justify-content: center;
            width: 1.45rem;
        }

        .workbench-grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(300px, 0.75fr);
            gap: 1rem;
            margin-bottom: 0;
        }

        @media (max-width: 960px) {
            .workbench-grid {
                grid-template-columns: 1fr;
            }
        }

        .task-list,
        .script-list,
        .target-list {
            display: grid;
            gap: 0.75rem;
        }

        .task-item,
        .script-card,
        .target-card {
            background: var(--bg-subtle);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 0.85rem;
        }

        .task-item {
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 0.75rem;
            align-items: start;
        }

        .task-item input {
            margin-top: 0.2rem;
        }

        .task-title,
        .script-title,
        .target-title {
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 0.15rem;
        }

        .script-body {
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: var(--text-main);
            font-size: 0.82rem;
            margin: 0.6rem 0;
            padding: 0.75rem;
            white-space: pre-wrap;
        }

        .target-meta {
            color: var(--text-muted);
            font-size: 0.78rem;
            margin-bottom: 0.55rem;
        }

        .manual-metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 0.75rem;
        }

        @media (max-width: 768px) {
            .manual-metrics-grid {
                grid-template-columns: 1fr;
            }
        }

        .metric-input-group {
            display: grid;
            gap: 0.3rem;
        }

        .metric-input-group label {
            color: var(--text-muted);
            font-size: 0.74rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .metric-input-group input {
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            font: inherit;
            padding: 0.62rem 0.7rem;
            width: 100%;
        }

        .manual-metrics-summary {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 0.75rem;
            margin-top: 1rem;
        }

        @media (max-width: 768px) {
            .manual-metrics-summary {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 480px) {
            .manual-metrics-summary {
                grid-template-columns: 1fr;
            }
        }

        .manual-metric {
            background: var(--bg-subtle);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 0.75rem;
        }

        .manual-metric strong {
            display: block;
            font-size: 1.15rem;
            margin-bottom: 0.1rem;
        }

        .manual-metric span {
            color: var(--text-muted);
            font-size: 0.78rem;
        }

        .warning-list {
            display: grid;
            gap: 0.45rem;
            margin-top: 0.9rem;
        }

        .warning-item {
            background: var(--warning-bg);
            border: 1px solid #fde68a;
            border-radius: var(--radius-sm);
            color: var(--warning-text);
            font-size: 0.82rem;
            padding: 0.65rem 0.75rem;
        }

        /* Tables */
        .card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            margin-bottom: 2rem;
        }

        .card-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff;
        }

        @media (max-width: 768px) {
            .card-header {
                padding: 0.75rem 1rem;
            }
        }

        .card-title {
            font-weight: 600;
            font-size: 1rem;
            color: var(--text-main);
        }

        @media (max-width: 768px) {
            .card-title {
                font-size: 0.9rem;
            }
        }

        .table-container {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
            min-width: 720px;
        }

        @media (max-width: 1024px) {
            table {
                min-width: 640px;
            }
        }

        @media (max-width: 768px) {
            table {
                font-size: 0.75rem;
                min-width: 560px;
            }
        }

        th {
            background: var(--bg-subtle);
            text-align: left;
            padding: 0.75rem 1.5rem;
            font-weight: 500;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-color);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            white-space: nowrap;
        }

        @media (max-width: 768px) {
            th {
                padding: 0.5rem 0.75rem;
                font-size: 0.65rem;
            }
        }

        td {
            padding: 0.875rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-main);
            vertical-align: middle;
        }

        @media (max-width: 768px) {
            td {
                padding: 0.625rem 0.75rem;
            }
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: var(--bg-subtle);
        }

        /* Badges */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 0.125rem 0.5rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 500;
            line-height: 1.4;
            border: 1px solid transparent;
        }

        .badge-success {
            background: var(--success-bg);
            color: var(--success-text);
            border-color: rgba(5, 150, 105, 0.1);
        }

        .badge-warning {
            background: var(--warning-bg);
            color: var(--warning-text);
            border-color: rgba(217, 119, 6, 0.1);
        }

        .badge-danger {
            background: var(--danger-bg);
            color: var(--danger-text);
            border-color: rgba(220, 38, 38, 0.1);
        }

        .badge-neutral {
            background: #f3f4f6;
            color: #374151;
            border-color: #e5e7eb;
        }

        .badge-info {
            background: var(--info-bg);
            color: var(--info-text);
            border-color: rgba(37, 99, 235, 0.1);
        }

        /* Filters */
        .filters-bar {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        @media (max-width: 768px) {
            .filters-bar {
                flex-direction: column;
            }
        }

        .filter-input {
            padding: 0.5rem 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            min-width: 200px;
            background: #fff;
            transition: all 0.15s ease;
            color: var(--text-main);
        }

        @media (max-width: 768px) {
            .filter-input {
                min-width: 100%;
                font-size: 0.8rem;
            }
        }

        .filter-input:focus {
            border-color: var(--text-muted);
            outline: none;
            box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.05);
        }

        .segmented-control {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-bottom: 1rem;
        }

        .segment-btn,
        .btn-secondary {
            border: 1px solid var(--border-color);
            background: #fff;
            color: var(--text-muted);
            border-radius: var(--radius-md);
            padding: 0.5rem 0.75rem;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.82rem;
            transition: all 0.15s ease;
        }

        .segment-btn:hover,
        .btn-secondary:hover {
            border-color: var(--border-hover);
            color: var(--text-main);
            background: var(--bg-subtle);
        }

        .segment-btn.active {
            background: #111827;
            border-color: #111827;
            color: #fff;
        }

        .users-toolbar {
            display: grid;
            grid-template-columns: minmax(220px, 1fr) repeat(3, minmax(140px, 180px));
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .users-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            color: var(--text-muted);
            font-size: 0.82rem;
            margin-bottom: 0.75rem;
        }

        .usage-stack {
            display: grid;
            gap: 0.45rem;
            min-width: 170px;
        }

        .usage-row {
            display: grid;
            grid-template-columns: 46px 1fr auto;
            gap: 0.5rem;
            align-items: center;
            font-size: 0.78rem;
            color: var(--text-muted);
        }

        .usage-bar {
            height: 6px;
            overflow: hidden;
            border-radius: 999px;
            background: #eef2f7;
        }

        .usage-fill {
            display: block;
            height: 100%;
            width: var(--usage-width);
            border-radius: inherit;
            background: #111827;
        }

        .usage-fill.warning {
            background: var(--warning-text);
        }

        .usage-fill.danger {
            background: var(--danger-text);
        }

        .pagination-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border-color);
            background: #fff;
            color: var(--text-muted);
            font-size: 0.82rem;
        }

        .empty-state {
            padding: 3rem 1.5rem;
            text-align: center;
            color: var(--text-muted);
        }

        @media (max-width: 900px) {
            .users-toolbar {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 768px) {
            .users-toolbar {
                grid-template-columns: 1fr;
            }

            .users-meta,
            .pagination-bar {
                align-items: stretch;
                flex-direction: column;
            }
        }

        /* Utilities */
        .hidden {
            display: none !important;
        }

        .flex {
            display: flex;
        }

        .items-center {
            align-items: center;
        }

        .justify-between {
            justify-content: space-between;
        }

        .gap-2 {
            gap: 0.5rem;
        }

        .text-sm {
            font-size: 0.875rem;
        }

        .text-muted {
            color: var(--text-muted);
        }

        .mt-4 {
            margin-top: 1rem;
        }

        /* Loading & Error */
        .loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .spinner {
            width: 2rem;
            height: 2rem;
            border: 2px solid var(--border-color);
            border-top-color: var(--text-main);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            padding: 0.75rem 1rem;
            border-radius: var(--radius-md);
            background: #111827;
            color: white;
            box-shadow: var(--shadow-card);
            transform: translateY(150%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
            font-weight: 500;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .toast.show {
            transform: translateY(0);
        }

        /* Modal */
        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(2px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .modal-backdrop.open {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-panel {
            background: #fff;
            width: 90%;
            max-width: 900px;
            max-height: 85vh;
            border-radius: var(--radius-lg);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            display: flex;
            flex-direction: column;
            transform: scale(0.98);
            transition: all 0.2s ease;
        }

        .modal-backdrop.open .modal-panel {
            transform: scale(1);
        }

        .modal-header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-body {
            padding: 1.5rem;
            overflow-y: auto;
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 2rem;
        }

        @media (max-width: 1024px) {
            .modal-body {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .modal-body {
                padding: 1rem;
                gap: 1rem;
            }
        }

        .modal-panel {
            background: #fff;
            width: 90%;
            max-width: 900px;
            max-height: 85vh;
            border-radius: var(--radius-lg);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            display: flex;
            flex-direction: column;
            transform: scale(0.98);
            transition: all 0.2s ease;
        }

        @media (max-width: 768px) {
            .modal-panel {
                width: 95%;
                max-height: 90vh;
            }
        }

        .image-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .gallery-img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: all 0.15s;
        }

        .gallery-img:hover {
            transform: scale(1.02);
            box-shadow: var(--shadow-sm);
        }

        .json-view {
            background: #f9fafb;
            color: #374151;
            padding: 1rem;
            border-radius: var(--radius-md);
            font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
            font-size: 0.8rem;
            white-space: pre-wrap;
            overflow-x: auto;
            max-height: 300px;
            line-height: 1.5;
            border: 1px solid var(--border-color);
        }

        /* Scrollbar Polish */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #9ca3af;
        }

        /* Mobile Card Layout for Tables */
        .mobile-card-list {
            display: none;
        }

        @media (max-width: 768px) {
            .table-container table {
                display: none;
            }

            .mobile-card-list {
                display: block !important;
            }
        }

        .mobile-card {
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 1rem;
            margin-bottom: 0.75rem;
        }

        .mobile-card-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
        }

        .mobile-card-row:last-child {
            margin-bottom: 0;
        }

        .mobile-card-label {
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            flex-shrink: 0;
            margin-right: 0.5rem;
        }

        .mobile-card-value {
            text-align: right;
            flex: 1;
        }

        /* Mobile specific utilities */
        @media (max-width: 768px) {
            .hide-mobile {
                display: none;
            }

            .text-sm.text-muted {
                font-size: 0.7rem;
            }

            /* Better touch targets */
            button,
            .nav-item,
            a {
                min-height: 44px;
                min-width: 44px;
            }
        }

        /* Overlay for mobile menu */
        .mobile-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 45;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .mobile-overlay.active {
            display: block;
            opacity: 1;
        }

        .mobile-bottom-nav {
            display: none;
        }

        @media (max-width: 768px) {
            .mobile-bottom-nav {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 0.5rem;
                padding: 0.75rem 1rem calc(0.75rem + env(safe-area-inset-bottom, 0px));
                background: rgba(255, 255, 255, 0.95);
                backdrop-filter: blur(12px);
                border-top: 1px solid var(--border-color);
                z-index: 44;
            }
        }

        .mobile-bottom-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.35rem;
            padding: 0.55rem 0.5rem;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            background: #f9fafb;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.15s ease;
        }

        .mobile-bottom-btn.active {
            background: #111827;
            color: #ffffff;
            border-color: #111827;
        }
    </style>
</head>

<body>
    <!-- Loading Screen (Default Visible to prevent flash) -->
    <div id="loadingScreen" class="auth-container" style="z-index: 10000;">
        <div class="spinner"></div>
    </div>

    <!-- Auth Screen (Hidden by default) -->
    <div id="authScreen" class="auth-container" style="display: none;">
        <div class="auth-card">
            <img src="/logo.svg" alt="Logo" class="auth-logo">
            <h1 class="auth-title">Admin Access</h1>
            <p class="auth-subtitle">Enter your secure key to continue</p>

            <div class="input-group">
                <label class="input-label">Admin Secret Key</label>
                <input type="password" id="adminSecret" class="form-input" placeholder="••••••••••••••••">
            </div>

            <div class="checkbox-wrapper">
                <input type="checkbox" id="rememberDevice">
                <label for="rememberDevice">Remember this device</label>
            </div>

            <button onclick="handleLogin()" class="btn-primary">Access Dashboard</button>
            <p id="authError" class="text-sm" style="color: var(--danger); margin-top: 1rem; display: none;"></p>
        </div>
    </div>

    <!-- Dashboard Layout -->
    <div id="dashboardLayout" class="hidden" style="width: 100%;">
        <!-- Mobile Overlay -->
        <div id="mobileOverlay" class="mobile-overlay" onclick="toggleMobileMenu(false)"></div>

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <img src="/logo.svg" alt="Logo" style="width: 24px; height: 24px;">
                <span>AutoLister AI</span>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-item active" data-view="overview" onclick="switchView('overview')">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="7" height="7"></rect>
                        <rect x="14" y="3" width="7" height="7"></rect>
                        <rect x="14" y="14" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                    </svg>
                    <span>Overview</span>
                </div>
                <div class="nav-item" data-view="growth" onclick="switchView('growth')">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"></polyline>
                        <polyline points="16 7 22 7 22 13"></polyline>
                    </svg>
                    <span>Growth</span>
                </div>
                <div class="nav-item" data-view="logs" onclick="switchView('logs')">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z">
                        </path>
                    </svg>
                    <span>API Logs</span>
                </div>
                <div class="nav-item" data-view="users" onclick="switchView('users')">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                        <circle cx="9" cy="7" r="4"></circle>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                    </svg>
                    <span>Users</span>
                </div>
            </nav>

            <div class="sidebar-footer">
                <div class="nav-item" onclick="handleLogout()" style="color: var(--danger-text);">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    <span>Logout</span>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <button class="mobile-menu-btn" onclick="toggleMobileMenu()" aria-label="Toggle menu">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <line x1="3" y1="12" x2="21" y2="12"></line>
                            <line x1="3" y1="6" x2="21" y2="6"></line>
                            <line x1="3" y1="18" x2="21" y2="18"></line>
                        </svg>
                    </button>
                    <h2 id="pageTitle" class="page-title">Overview</h2>
                </div>
                <div class="flex items-center gap-2">
                    <span id="lastUpdated" class="text-sm text-muted" style="display: none;">Updated just now</span>
                    <button onclick="refreshData()" class="btn-primary" style="width: auto; padding: 0.5rem 1rem;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" style="margin-right: 0.5rem;">
                            <polyline points="23 4 23 10 17 10"></polyline>
                            <polyline points="1 20 1 14 7 14"></polyline>
                            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                        </svg>
                        <span class="hide-mobile">Refresh</span>
                    </button>
                </div>
            </header>

            <div id="contentArea" class="content-scroll">
                <!-- Views will be injected here -->
            </div>
        </main>

        <nav class="mobile-bottom-nav" aria-label="Mobile navigation">
            <button class="mobile-bottom-btn active" data-view="overview"
                onclick="switchView('overview')">Overview</button>
            <button class="mobile-bottom-btn" data-view="growth" onclick="switchView('growth')">Growth</button>
            <button class="mobile-bottom-btn" data-view="logs" onclick="switchView('logs')">Logs</button>
            <button class="mobile-bottom-btn" data-view="users" onclick="switchView('users')">Users</button>
        </nav>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <!-- Modal -->
    <div id="modalBackdrop" class="modal-backdrop">
        <div class="modal-panel">
            <div class="modal-header">
                <h3 id="modalTitle" class="card-title">Details</h3>
                <button onclick="closeModal()"
                    style="background: none; border: none; cursor: pointer; font-size: 1.5rem;">&times;</button>
            </div>
            <div id="modalBody" class="modal-body"></div>
        </div>
    </div>

    <script>
        // State Management
        const state = {
            secret: '',
            currentView: getInitialAdminView(),
            data: null,
            logsPage: 1,
            usersPage: 1,
            usersSegment: 'today',
            usersSearch: '',
            usersTier: 'all',
            usersStatus: 'all',
            usersSort: 'created_desc',
            userSearchTimer: null,
            cachedData: {},
            isTransitioning: false
        };

        function getInitialAdminView() {
            const view = window.location.hash.replace('#', '');
            return ['overview', 'growth', 'logs', 'users'].includes(view) ? view : 'overview';
        }

        // --- Auth Logic ---
        function init() {
            const storedKey = localStorage.getItem('admin_key');
            const authScreen = document.getElementById('authScreen');
            const loadingScreen = document.getElementById('loadingScreen');

            if (storedKey) {
                state.secret = atob(storedKey); // Simple obfuscation
                verifyAuth();
            } else {
                // No key, show login immediately
                loadingScreen.style.display = 'none';
                authScreen.style.display = 'flex';
            }
        }

        async function handleLogin() {
            const input = document.getElementById('adminSecret').value;
            const remember = document.getElementById('rememberDevice').checked;

            if (!input) return showAuthError('Please enter a key');

            state.secret = input;
            const success = await verifyAuth();

            if (success && remember) {
                localStorage.setItem('admin_key', btoa(input));
            }
        }

        async function verifyAuth() {
            const loadingScreen = document.getElementById('loadingScreen');
            const authScreen = document.getElementById('authScreen');
            const dashboard = document.getElementById('dashboardLayout');

            try {
                const res = await fetch('/api/admin?action=usage-stats', {
                    headers: { 'Authorization': `Bearer ${state.secret}` }
                });

                if (res.ok) {
                    loadingScreen.style.display = 'none';
                    authScreen.style.display = 'none';
                    dashboard.classList.remove('hidden');
                    dashboard.style.display = 'flex';
                    updateNavigationState(state.currentView);
                    loadView(state.currentView);
                    return true;
                } else {
                    loadingScreen.style.display = 'none';
                    authScreen.style.display = 'flex';
                    showAuthError('Invalid credentials');
                    localStorage.removeItem('admin_key');
                    return false;
                }
            } catch (e) {
                loadingScreen.style.display = 'none';
                authScreen.style.display = 'flex';
                showAuthError('Connection failed');
                return false;
            }
        }

        function handleLogout() {
            state.secret = '';
            localStorage.removeItem('admin_key');
            location.reload();

        // --- Navigation & Views ---
        function switchView(viewName) {
            if (state.isTransitioning || state.currentView === viewName) return;

            state.currentView = viewName;
            state.isTransitioning = true;
            if (window.location.hash !== `#${viewName}`) {
                history.pushState(null, '', `#${viewName}`);
            }

            // Close mobile menu if open
            if (window.innerWidth <= 768) {
                toggleMobileMenu(false);
            }

            updateNavigationState(viewName);

            loadView(viewName);
        }

        function updateNavigationState(viewName) {
            document.querySelectorAll('.nav-item[data-view]').forEach(el => {
                el.classList.toggle('active', el.dataset.view === viewName);
            });

            document.querySelectorAll('.mobile-bottom-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.view === viewName);
            });

            const titles = { overview: 'Overview', growth: 'Growth', logs: 'API Logs', users: 'User Management' };
            document.getElementById('pageTitle').textContent = titles[viewName] || 'Overview';
        }

        window.addEventListener('hashchange', () => {
            const nextView = getInitialAdminView();
            if (nextView !== state.currentView) {
                state.currentView = nextView;
                updateNavigationState(nextView);
                loadView(nextView);
            }
        });

        function toggleMobileMenu(forceState) {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobileOverlay');

            const nextState = forceState !== undefined ? forceState : !sidebar.classList.contains('mobile-open');

            if (nextState) {
                sidebar.classList.add('mobile-open');
                overlay.classList.add('active');
                document.body.classList.add('menu-locked');
            } else {
                sidebar.classList.remove('mobile-open');
                overlay.classList.remove('active');
                document.body.classList.remove('menu-locked');
            }
        }

        async function loadView(view) {
            const content = document.getElementById('contentArea');

            content.innerHTML = `<div class="loading-state"><div class="spinner"></div><span>Loading ${escapeHtml(view)}...</span></div>`;
            content.style.opacity = '1';
            content.style.transition = 'opacity 0.15s ease';

            try {
                if (view === 'overview') await renderOverview(content);
                else if (view === 'growth') await renderGrowth(content);
                else if (view === 'logs') await renderLogs(content);
                else if (view === 'users') await renderUsers(content);

                // Fade in
                setTimeout(() => {
                    content.style.opacity = '1';
                    state.isTransitioning = false;
                }, 50);
            } catch (e) {
                content.innerHTML = `<div style="padding: 2rem; text-align: center; color: var(--danger-text);">Error loading view: ${e.message}</div>`;
                content.style.opacity = '1';
                state.isTransitioning = false;
            }
        }

        function refreshData() {
            // Clear cached data to force fresh fetch
            state.cachedData = {};
            loadView(state.currentView);
            showToast('Data refreshed', 'success');
        }

        function getLocalTodayRange() {
            const start = new Date();
            start.setHours(0, 0, 0, 0);
            const end = new Date(start);

                start: start.toISOString(),
                end: end.toISOString()
            };

        function renderOption(value, label, selected) {
            return `<option value="${value}" ${selected === value ? 'selected' : ''}>${label}</option>`;

        function escapeHtml(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function escapeAttribute(value) {
            return escapeHtml(value).replace(/`/g, '&#96;');

            if (!value) return 'Unknown';
            return new Date(value).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
