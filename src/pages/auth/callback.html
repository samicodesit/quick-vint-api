<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Signing in - AutoLister AI</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f8fafc;
        color: #111827;
      }
      main {
        width: min(92vw, 440px);
        padding: 28px;
        border: 1px solid #e5e7eb;
        border-radius: 18px;
        background: white;
        box-shadow: 0 20px 60px rgba(15, 23, 42, 0.12);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 24px;
        line-height: 1.2;
      }
      p {
        margin: 0;
        color: #64748b;
        line-height: 1.6;
      }
      .status {
        margin-top: 18px;
        font-weight: 700;
        color: #4f46e5;
      }
      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Signing you in</h1>
      <p id="authCallbackCopy">
        Keep this tab open while AutoLister AI finishes sign-in.
      </p>
      <p id="authCallbackStatus" class="status">Opening the extension...</p>
    </main>
    <script src="/auth-callback.js"></script>
  </body>
</html>
