<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Signing in - AutoLister AI</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f8fafc;
        color: #111827;
      }
      main {
        width: min(92vw, 460px);
        padding: 30px;
        border: 1px solid #e5e7eb;
        border-radius: 20px;
        background: white;
        box-shadow: 0 24px 70px rgba(15, 23, 42, 0.14);
        transition:
          border-color 200ms ease,
          transform 200ms ease;
      }
      main[data-state="success"] {
        border-color: #bbf7d0;
        transform: translateY(-2px);
      }
      main[data-state="error"] {
        border-color: #fecaca;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 24px;
        line-height: 1.2;
      }
      p {
        margin: 0;
        color: #64748b;
        line-height: 1.6;
      }
      .status {
        margin: 0;
        font-weight: 700;
        color: #4f46e5;
      }
      .status-row {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-top: 22px;
      }
      .mark {
        width: 42px;
        height: 42px;
        border-radius: 999px;
        display: grid;
        place-items: center;
        background: #eef2ff;
        transition:
          background 200ms ease,
          transform 200ms ease;
      }
      .mark::before {
        content: "";
        width: 10px;
        height: 18px;
        border: solid #4f46e5;
        border-width: 0 3px 3px 0;
        transform: rotate(45deg) translateY(-1px);
      }
      main[data-state="success"] .mark {
        background: #dcfce7;
        transform: scale(1.04);
      }
      main[data-state="success"] .mark::before {
        border-color: #16a34a;
      }
      main[data-state="error"] .mark {
        background: #fee2e2;
      }
      main[data-state="error"] .mark::before {
        width: 16px;
        height: 3px;
        border: 0;
        background: #dc2626;
        transform: none;
      }
      .countdown {
        display: none;
        margin-left: auto;
        min-width: 86px;
        padding: 8px 10px;
        border-radius: 999px;
        background: #f1f5f9;
        color: #334155;
        font-size: 13px;
        font-weight: 700;
        text-align: center;
      }
      main[data-state="success"] .countdown {
        display: block;
        animation: pulse 1000ms ease-in-out infinite;
      }
      .progress {
        display: none;
        height: 4px;
        margin-top: 22px;
        overflow: hidden;
        border-radius: 999px;
        background: #e5e7eb;
      }
      .progress span {
        display: block;
        height: 100%;
        width: 100%;
        border-radius: inherit;
        background: #22c55e;
        transform-origin: left;
      }
      main[data-state="success"] .progress {
        display: block;
      }
      main[data-state="success"] .progress span {
        animation: shrink 3400ms linear forwards;
      }
      .hidden {
        display: none;
      }
      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.04);
        }
      }
      @keyframes shrink {
        from {
          transform: scaleX(1);
        }
        to {
          transform: scaleX(0);
        }
      }
    </style>
  </head>
  <body>
    <main id="authCallbackCard">
      <h1>Signing you in</h1>
      <p id="authCallbackCopy">
        Keep this tab open while AutoLister AI finishes sign-in.
      </p>
      <div class="status-row">
        <div class="mark" aria-hidden="true"></div>
        <p id="authCallbackStatus" class="status">Opening the extension...</p>
        <div class="countdown"><span id="authCountdown">3</span></div>
      </div>
      <div class="progress"><span></span></div>
    </main>
    <script src="/auth-callback.js"></script>
  </body>
</html>
