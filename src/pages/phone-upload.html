<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>QuickVint Upload</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #0f172a;
            --text-sub: #64748b;
            --border: #e2e8f0;
            --radius: 24px;
            --radius-sm: 12px;
            --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 440px;
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 40px 32px;
            text-align: center;
            transition: transform 0.2s ease;
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            margin: 0 0 12px;
            letter-spacing: -0.03em;
            color: var(--text);
        }

        p {
            margin: 0 0 36px;
            color: var(--text-sub);
            font-size: 16px;
            line-height: 1.5;
        }

        .upload-btn {
            background: var(--primary);
            color: white;
            width: 100%;
            padding: 20px;
            border-radius: 18px;
            font-size: 17px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 10px 25px -5px rgba(79, 70, 229, 0.4);
        }

        .upload-btn:active {
            transform: scale(0.97);
            background: var(--primary-hover);
        }

        .upload-btn.secondary {
            margin-top: 12px;
            background: #0f172a;
            box-shadow: 0 10px 25px -5px rgba(15, 23, 42, 0.24);
        }

        .upload-btn:disabled {
            opacity: 0.55;
            cursor: not-allowed;
            transform: none;
        }

        .upload-btn svg {
            width: 24px;
            height: 24px;
        }

        .file-list {
            margin-top: 32px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            text-align: left;
        }

        .batch-mode .file-list {
            margin-top: 22px;
        }

        .file-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 10px;
            background: #f8fafc;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            animation: slideIn 0.3s ease-out;
        }

        .file-order {
            width: 24px;
            height: 24px;
            border-radius: 999px;
            background: #eef2ff;
            color: var(--primary);
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 800;
            flex-shrink: 0;
        }

        .batch-mode .file-order {
            display: flex;
        }

        .file-actions {
            display: none;
            flex-direction: column;
            gap: 6px;
            flex-shrink: 0;
        }

        .batch-mode .file-actions {
            display: flex;
        }

        .file-actions button {
            width: 34px;
            height: 28px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: white;
            color: var(--text);
            font-size: 12px;
            font-weight: 800;
        }

        .file-actions button:disabled {
            opacity: 0.35;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .file-preview {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            object-fit: cover;
            background: #e2e8f0;
            flex-shrink: 0;
        }

        .file-info {
            flex: 1;
            min-width: 0;
        }

        .file-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }

        .progress-bar {
            height: 4px;
            background: #e2e8f0;
            border-radius: 4px;
            overflow: hidden;
            width: 100%;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.2s ease;
        }

        .file-status {
            font-size: 12px;
            font-weight: 500;
            margin-top: 4px;
            color: var(--text-sub);
        }

        .status-done {
            color: #10b981;
        }

        .status-error {
            color: #ef4444;
        }

        .session-footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            font-size: 12px;
            color: #cbd5e1;
            display: flex;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .session-footer:hover {
            color: var(--text-sub);
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #1e293b;
            color: white;
            padding: 12px 20px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 500;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            z-index: 100;
            white-space: nowrap;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .batch-progress {
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: #f8fafc;
            padding: 16px;
        }

        .batch-progress-main {
            display: flex;
            justify-content: space-between;
            gap: 14px;
            color: var(--text);
            font-size: 15px;
            font-weight: 700;
        }

        .batch-progress-sub {
            margin-top: 7px;
            color: var(--text-sub);
            font-size: 13px;
            line-height: 1.4;
        }

        .batch-progress .progress-bar {
            margin-top: 14px;
            height: 6px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1 id="pageTitle">Upload Photos</h1>
        <p id="pageCopy">Select photos for your <strong>current item</strong>.<br>Start a new session for a different item.</p>

        <button class="upload-btn" id="mainBtn">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
            </svg>
            Select Photos
        </button>
        <button class="upload-btn secondary" id="sendBtn" style="display: none;" disabled>
            Retry Failed Photos
        </button>

        <div class="file-list" id="fileList"></div>

        <div class="session-footer" id="sessionFooter">
            Session: <span id="sessionCode">...</span>
        </div>
    </div>

    <input type="file" id="fileInput" multiple accept="image/*" style="display: none;">
    <div class="toast" id="toast">Link copied to clipboard</div>

    <script>
        (() => {
            const API_UPLOAD = '/api/phone-upload';
            const API_COMPLETE = '/api/phone-upload?action=complete';
            const BATCH_UPLOAD_CONCURRENCY = 2;

            const sessionCodeEl = document.getElementById('sessionCode');
            const pageTitle = document.getElementById('pageTitle');
            const pageCopy = document.getElementById('pageCopy');
            const fileInput = document.getElementById('fileInput');
            const mainBtn = document.getElementById('mainBtn');
            const sendBtn = document.getElementById('sendBtn');
            const fileList = document.getElementById('fileList');
            const toastEl = document.getElementById('toast');
            const sessionFooter = document.getElementById('sessionFooter');

            const state = {
                sessionId: null,
                files: [],
                isSending: false,
                nextOrder: 0,
                completeSent: false,
                completeFailed: false,
                wakeLock: null
            };

            function createSessionId() {
                const url = new URL(window.location.href);
                const existing = url.searchParams.get('s') || url.searchParams.get('session');
                if (existing) return existing;
                return 'sess_' + Math.random().toString(36).slice(2, 10);
            }

            function isBatchMode() {
                const url = new URL(window.location.href);
                return url.searchParams.get('mode') === 'batch';
            }

            function getTrackingMode() {
                return isBatchMode() ? 'batch' : 'single';
            }

            function trackUploadEvent(event, context = {}) {
                try {
                    fetch('/api/events/track', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            event,
                            source: 'phone_upload_page',
                            page: `${location.origin}${location.pathname}`,
                            context: {
                                mode: getTrackingMode(),
                                sessionId: state.sessionId,
                                ...context
                            }
                        })
                    }).catch(() => {});
                } catch (error) {
                    // Upload analytics must never block photo transfer.
                }
            }

            function syncPageCopy() {
                if (!isBatchMode()) return;
                document.body.classList.add('batch-mode');
                pageTitle.textContent = 'Upload Batch Photos';
                pageCopy.innerHTML = 'Select photos once. Upload starts immediately in your phone gallery order.';
                mainBtn.lastChild.textContent = 'Select Photos';
            }

            function showToast(msg) {
                toastEl.textContent = msg;
                toastEl.classList.add('show');
                setTimeout(() => toastEl.classList.remove('show'), 2000);
            }

            function renderFile(item) {
                if (isBatchMode()) return null;

                const el = document.createElement('div');
                el.className = 'file-item';
                el.innerHTML = `
            <div class="file-order"></div>
            <img src="${item.preview}" class="file-preview">
            <div class="file-info">
                <div class="file-name">${item.name}</div>
                <div class="progress-bar"><div class="progress-fill" style="width: 0%"></div></div>
                <div class="file-status">Waiting...</div>
            </div>
            <div class="file-actions">
                <button type="button" class="move-up">Up</button>
                <button type="button" class="move-down">Down</button>
            </div>
        `;
                fileList.appendChild(el);
                item.el = el;
                el.querySelector('.move-up')?.addEventListener('click', () => moveItem(item, -1));
                el.querySelector('.move-down')?.addEventListener('click', () => moveItem(item, 1));
                updateBatchOrderUI();
                return {
                    el,
                    fill: el.querySelector('.progress-fill'),
                    status: el.querySelector('.file-status')
                };
            }

            function renderBatchProgress() {
                if (!isBatchMode()) return;

                const total = state.files.length;
                const sent = state.files.filter((item) => item.done).length;
                const failed = state.files.filter((item) => item.failed && !item.done).length;
                const preparing = state.files.filter((item) => item.preparing && !item.done).length;
                const uploading = state.files.filter((item) => item.uploading && !item.done).length;
                const pct = total ? Math.round((sent / total) * 100) : 0;
                let title = 'Ready to send';
                let detail = 'Choose photos from your phone gallery.';

                if (state.isSending) {
                    title = `Sending ${Math.min(sent + preparing + uploading, total)} of ${total}`;
                    detail = preparing > 0
                        ? 'Compressing photos before upload. Keep this page open.'
                        : 'Uploading compressed photos. Keep this page open.';
                } else if (state.completeSent) {
                    title = `${sent} photos sent`;
                    detail = 'Return to your desktop to group photos into listings.';
                } else if (state.completeFailed) {
                    title = 'Desktop handoff failed';
                    detail = 'Tap retry to notify your desktop again.';
                } else if (failed > 0) {
                    title = `${failed} photo${failed === 1 ? '' : 's'} failed`;
                    detail = 'Retry the failed photos when your connection is stable.';
                } else if (total > 0) {
                    title = `${sent} of ${total} photos sent`;
                    detail = sent === total ? 'Finalizing desktop handoff...' : 'Upload is paused.';
                }

                fileList.innerHTML = `
                    <div class="batch-progress">
                        <div class="batch-progress-main">
                            <span>${title}</span>
                            <span>${pct}%</span>
                        </div>
                        <div class="batch-progress-sub">${detail}</div>
                        <div class="progress-bar"><div class="progress-fill" style="width: ${pct}%"></div></div>
                    </div>
                `;

                sendBtn.style.display = (failed > 0 || state.completeFailed) && !state.isSending && !state.completeSent ? 'flex' : 'none';
                sendBtn.disabled = state.isSending;
                mainBtn.disabled = state.isSending || state.completeSent;
            }

            function uploadFile(item, ui) {
                return new Promise((resolve, reject) => {
                    const form = new FormData();
                    form.append('sessionId', state.sessionId);
                    form.append('uploadOrder', String(item.order));
                    form.append('file', item.file);

                    const xhr = new XMLHttpRequest();
                    xhr.open('POST', API_UPLOAD, true);
                    item.failed = false;
                    item.uploading = true;
                    if (ui) {
                        ui.fill.style.width = '0%';
                        ui.fill.style.background = '';
                        ui.status.classList.remove('status-done', 'status-error');
                        ui.status.textContent = 'Starting...';
                    }
                    renderBatchProgress();

                    xhr.upload.onprogress = (e) => {
                        if (e.lengthComputable) {
                            const pct = Math.round((e.loaded / e.total) * 100);
                            if (ui) {
                                ui.fill.style.width = pct + '%';
                                ui.status.textContent = pct === 100 ? 'Processing...' : 'Uploading...';
                            }
                        }
                    };

                    xhr.onload = () => {
                        if (xhr.status >= 200 && xhr.status < 300) {
                            if (ui) {
                                ui.fill.style.width = '100%';
                                ui.fill.style.background = '#10b981';
                                ui.status.textContent = 'Sent';
                                ui.status.classList.add('status-done');
                            }
                            item.done = true;
                            item.failed = false;
                            item.uploading = false;
                            trackUploadEvent('phone_upload_file_success', {
                                order: item.order,
                                fileSize: item.file?.size || null,
                                fileType: item.file?.type || null
                            });
                            renderBatchProgress();
                            resolve();
                        } else {
                            if (ui) {
                                ui.status.textContent = 'Failed';
                                ui.status.classList.add('status-error');
                                ui.fill.style.background = '#ef4444';
                            }
                            item.failed = true;
                            item.uploading = false;
                            trackUploadEvent('phone_upload_file_error', {
                                order: item.order,
                                status: xhr.status || null
                            });
                            renderBatchProgress();
                            reject(new Error('Upload failed'));
                        }
                    };

                    xhr.onerror = () => {
                        if (ui) {
                            ui.status.textContent = 'Error';
                            ui.status.classList.add('status-error');
                        }
                        item.failed = true;
                        item.uploading = false;
                        trackUploadEvent('phone_upload_file_error', {
                            order: item.order,
                            status: null,
                            reason: 'network'
                        });
                        renderBatchProgress();
                        reject(new Error('Upload error'));
                    };

                    xhr.send(form);
                });
            }

            function compressImage(file) {
                return new Promise((resolve) => {
                    // If not an image, return as is
                    if (!file.type.startsWith('image/')) return resolve(file);

                    const img = new Image();
                    const url = URL.createObjectURL(file);

                    img.onload = () => {
                        URL.revokeObjectURL(url);
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;

                        // Max dimension 1920px (Full HD is enough for Vinted)
                        const MAX_SIZE = 1920;
                        if (width > height) {
                            if (width > MAX_SIZE) {
                                height *= MAX_SIZE / width;
                                width = MAX_SIZE;
                            }
                        } else {
                            if (height > MAX_SIZE) {
                                width *= MAX_SIZE / height;
                                height = MAX_SIZE;
                            }
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        // Compress to JPEG 0.8 quality
                        canvas.toBlob((blob) => {
                            if (!blob) return resolve(file); // Fallback
                            // Create new file with same name but .jpg extension if needed
                            // Add timestamp to avoid duplicate filename errors on server
                            const timestamp = Date.now();
                            const originalName = file.name.replace(/\.[^/.]+$/, "");
                            const newName = `${originalName}_${timestamp}.jpg`;

                            const newFile = new File([blob], newName, {
                                type: 'image/jpeg',
                                lastModified: Date.now()
                            });
                            resolve(newFile);
                        }, 'image/jpeg', 0.8);
                    };

                    img.onerror = () => resolve(file);
                    img.src = url;
                });
            }

            function updateBatchOrderUI() {
                if (!isBatchMode()) return;

                state.files.forEach((item, index) => {
                    item.order = index;
                    const orderEl = item.el?.querySelector('.file-order');
                    const upBtn = item.el?.querySelector('.move-up');
                    const downBtn = item.el?.querySelector('.move-down');
                    if (orderEl) orderEl.textContent = String(index + 1);
                    if (upBtn) upBtn.disabled = state.isSending || index === 0;
                    if (downBtn) downBtn.disabled = state.isSending || index === state.files.length - 1;
                });

                const allDone = state.files.length > 0 && state.files.every((item) => item.done);
                sendBtn.disabled = state.isSending || state.files.length === 0 || (allDone && state.completeSent);
                if (!state.isSending && state.files.some((item) => item.failed && !item.done)) {
                    sendBtn.textContent = 'Retry Failed Photos';
                } else if (allDone && state.completeSent) {
                    sendBtn.textContent = 'Sent to Desktop';
                } else {
                    sendBtn.textContent = 'Send Photos';
                }
            }

            function moveItem(item, direction) {
                if (state.isSending) return;
                const currentIndex = state.files.indexOf(item);
                const nextIndex = currentIndex + direction;
                if (currentIndex < 0 || nextIndex < 0 || nextIndex >= state.files.length) return;

                const [moved] = state.files.splice(currentIndex, 1);
                state.files.splice(nextIndex, 0, moved);
                state.files.forEach((fileItem) => fileList.appendChild(fileItem.el));
                updateBatchOrderUI();
            }

            async function prepareAndUploadItem(item, ui) {
                if (ui) ui.status.textContent = 'Compressing...';
                try {
                    if (!item.compressed) {
                        item.preparing = true;
                        renderBatchProgress();
                        const compressedFile = await compressImage(item.originalFile || item.file);
                        item.file = compressedFile;
                        item.compressed = true;
                        item.preparing = false;
                        if (item.name !== compressedFile.name) {
                            item.name = compressedFile.name;
                            if (ui) ui.el.querySelector('.file-name').textContent = compressedFile.name;
                        }
                    }
                    if (ui) ui.status.textContent = 'Uploading...';
                    renderBatchProgress();
                    await uploadFile(item, ui);
                    return true;
                } catch (e) {
                    console.error(e);
                    item.preparing = false;
                    item.uploading = false;
                    if (!item.done) {
                        if (ui) {
                            ui.status.textContent = 'Failed';
                            ui.status.classList.add('status-error');
                        }
                        item.failed = true;
                    }
                    renderBatchProgress();
                    return false;
                }
            }

            async function requestWakeLock() {
                if (!isBatchMode() || state.wakeLock || !('wakeLock' in navigator)) return;
                try {
                    state.wakeLock = await navigator.wakeLock.request('screen');
                    state.wakeLock.addEventListener('release', () => {
                        state.wakeLock = null;
                    });
                } catch (error) {
                    state.wakeLock = null;
                }
            }

            async function releaseWakeLock() {
                if (!state.wakeLock) return;
                try {
                    await state.wakeLock.release();
                } catch (error) {
                    // Wake lock may already be released by the browser.
                }
                state.wakeLock = null;
            }

            async function completeBatchUpload() {
                let response = null;
                for (let attempt = 0; attempt < 8; attempt += 1) {
                    response = await fetch(`${API_COMPLETE}&sessionId=${encodeURIComponent(state.sessionId)}&expectedCount=${state.files.length}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            expectedCount: state.files.length,
                            orders: state.files.map((item) => item.order)
                        })
                    });

                    if (response.ok) break;
                    if (response.status !== 409 || attempt === 7) break;
                    await new Promise((resolve) => setTimeout(resolve, 900));
                }

                if (!response?.ok) {
                    state.completeFailed = true;
                    renderBatchProgress();
                    trackUploadEvent('phone_upload_batch_complete_error', {
                        fileCount: state.files.length,
                        status: response?.status || null
                    });
                    throw new Error('Could not mark batch complete');
                }

                state.completeSent = true;
                state.completeFailed = false;
                trackUploadEvent('phone_upload_batch_complete_success', {
                    fileCount: state.files.length
                });
                pageTitle.textContent = 'Photos Sent';
                pageCopy.innerHTML = 'Return to your desktop to group photos into listings.';
                renderBatchProgress();
                showToast('Sent to desktop');
            }

            async function sendBatchFiles() {
                if (!isBatchMode() || state.isSending || state.files.length === 0) return;
                state.isSending = true;
                mainBtn.disabled = true;
                state.completeSent = false;
                state.completeFailed = false;
                renderBatchProgress();
                await requestWakeLock();
                trackUploadEvent('phone_upload_send_start', {
                    fileCount: state.files.length,
                    retryCount: state.files.filter((item) => item.failed && !item.done).length
                });

                let failedCount = 0;
                let cursor = 0;
                const pendingItems = state.files.filter((item) => !item.done);
                state.files.forEach((item, index) => {
                    item.order = index;
                });

                async function runNextUpload() {
                    while (cursor < pendingItems.length) {
                        const item = pendingItems[cursor];
                        cursor += 1;
                        const ok = await prepareAndUploadItem(item, item.ui);
                        if (!ok) failedCount += 1;
                    }
                }

                const workerCount = Math.min(BATCH_UPLOAD_CONCURRENCY, pendingItems.length);
                await Promise.all(
                    Array.from({ length: workerCount }, () => runNextUpload())
                );

                if (state.files.every((item) => item.done)) {
                    try {
                        await completeBatchUpload();
                    } catch (error) {
                        console.error(error);
                        showToast('Upload finished, but desktop was not notified. Tap retry.');
                        failedCount = 1;
                    }
                } else if (failedCount > 0) {
                    showToast(`${failedCount} photo${failedCount === 1 ? '' : 's'} failed. Retry when ready.`);
                }

                trackUploadEvent('phone_upload_send_finished', {
                    fileCount: state.files.length,
                    sentCount: state.files.filter((item) => item.done).length,
                    failedCount,
                    completeSent: state.completeSent
                });

                state.isSending = false;
                mainBtn.disabled = state.completeSent;
                await releaseWakeLock();
                renderBatchProgress();
            }

            function handleFiles(files) {
                Array.from(files).forEach(async (originalFile) => {
                    const order = state.nextOrder++;

                    const item = {
                        file: originalFile, // Will be replaced by compressed
                        originalFile,
                        name: originalFile.name,
                        preview: isBatchMode() ? '' : URL.createObjectURL(originalFile),
                        order,
                        done: false,
                        failed: false,
                        compressed: false,
                        preparing: false,
                        uploading: false
                    };

                    state.files.push(item);
                    state.completeSent = false;
                    const ui = renderFile(item);
                    item.ui = ui;

                    if (isBatchMode()) {
                        renderBatchProgress();
                        return;
                    }

                    await prepareAndUploadItem(item, ui);
                });

                if (isBatchMode() && files.length > 0) {
                    setTimeout(sendBatchFiles, 0);
                }
            }

            function handleFileInputChange(e) {
                const files = Array.from(e.target.files || []);
                e.target.value = '';
                if (!files.length) return;
                trackUploadEvent('phone_upload_files_selected', {
                    fileCount: files.length,
                    totalFileCount: state.files.length + files.length
                });

                let didStart = false;
                const startHandling = () => {
                    if (didStart) return;
                    didStart = true;
                    setTimeout(() => handleFiles(files), 0);
                };

                requestAnimationFrame(startHandling);
                setTimeout(startHandling, 120);
            }

            // Init
            state.sessionId = createSessionId();
            sessionCodeEl.textContent = state.sessionId;
            syncPageCopy();
            trackUploadEvent('phone_upload_page_open', {
                hasSessionParam: new URL(window.location.href).searchParams.has('s')
            });

            mainBtn.addEventListener('click', () => fileInput.click());
            sendBtn.addEventListener('click', sendBatchFiles);
            fileInput.addEventListener('change', handleFileInputChange);

            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'visible' && state.isSending) {
                    requestWakeLock();
                }
            });

            sessionFooter.addEventListener('click', () => {
                const modeParam = isBatchMode() ? '&mode=batch' : '';
                const link = `${location.origin}${location.pathname}?s=${state.sessionId}${modeParam}`;
                navigator.clipboard.writeText(link).then(() => showToast('Link copied'));
            });

            // Drag drop support on the whole container
            const container = document.querySelector('.container');
            container.addEventListener('dragover', e => { e.preventDefault(); container.style.transform = 'scale(0.98)'; });
            container.addEventListener('dragleave', e => { e.preventDefault(); container.style.transform = 'scale(1)'; });
            container.addEventListener('drop', e => {
                e.preventDefault();
                container.style.transform = 'scale(1)';
                trackUploadEvent('phone_upload_files_selected', {
                    fileCount: e.dataTransfer.files.length,
                    totalFileCount: state.files.length + e.dataTransfer.files.length,
                    input: 'drop'
                });
                handleFiles(e.dataTransfer.files);
            });

        })();
    </script>
</body>

</html>
